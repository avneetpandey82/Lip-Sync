name: Docker Build & Push

on:
  push:
    branches:
      - "**" # trigger on every branch push
  pull_request:
    branches:
      - main # build (but don't push) on PRs targeting main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Derive clean branch name (strips refs/heads/, replaces / with -) ───
      - name: Set branch tag
        id: vars
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          # Replace any / in branch names (e.g. feature/foo → feature-foo)
          BRANCH_TAG="${BRANCH//\//-}"
          echo "branch_tag=$BRANCH_TAG" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ── 3. Set up QEMU for multi-platform builds (arm64 + amd64) ──────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 4. Set up Docker Buildx (enables layer caching & multi-platform) ──────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Log in to Docker Hub ────────────────────────────────────────────────
      - name: Log in to Docker Hub
        # Skip login on pull_request eventss (forks don't have secrets access)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 6. Build & push ────────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          # Only push on real branch pushes, not PRs
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            avneetpandey82/lip-sync:${{ steps.vars.outputs.branch_tag }}
            ${{ github.ref == 'refs/heads/main' && 'avneetpandey82/lip-sync:latest' || '' }}
          # Pass branch + SHA into the image as build args
          build-args: |
            GIT_BRANCH=${{ steps.vars.outputs.branch_tag }}
            GIT_SHA=${{ steps.vars.outputs.sha_short }}
          # Cache layers in GitHub Actions cache for faster rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
